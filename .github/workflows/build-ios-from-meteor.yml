# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow: iOS Meteor/Cordova Build & Upload
#
# Full pipeline: Setup → (optional pre-build hook) → Meteor build → CocoaPods
#                → Fastlane sign/archive → TestFlight upload
#
# Use this workflow for the simple case (no custom pre-build steps needed).
# For apps that need custom steps with secret access (Firebase decode,
# config patching, asset generation, etc.), compose the actions directly:
#   - mieweb/actions/prepare-meteor-cordova-env@v2
#   - <your custom steps with direct ${{ secrets.* }} access>
#   - mieweb/actions/run-meteor-build@v2
#   - mieweb/actions/sign-archive-upload-ios@v2
#
# Callers use `secrets: inherit` — the workflow references secrets by
# conventional names directly. No per-secret mapping needed.
#
# Required secrets (org or repo level):
#   APPLE_TEAM_ID, MATCH_GIT_BASIC_AUTHORIZATION, MATCH_PASSWORD,
#   APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, APPLE_API_KEY_P8_BASE64
# ─────────────────────────────────────────────────────────────────────────────
name: iOS Meteor/Cordova Build & Upload

on:
  workflow_call:
    inputs:
      # ── App identity ────────────────────────────────────────────────────────
      app_identifier:
        description: "Target iOS bundle ID (e.g. org.mieweb.os.dev)"
        required: true
        type: string
      meteor_server:
        description: "Meteor DDP server URL baked into the Cordova build"
        required: true
        type: string

      # ── Toolchain ───────────────────────────────────────────────────────────
      xcode_path:
        description: "Absolute path to Xcode.app"
        required: false
        type: string
        default: "/Applications/Xcode_26.app"
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"

      # ── Customisation hook ──────────────────────────────────────────────────
      pre_build_script:
        description: "Inline bash to run before the Meteor build. Skipped if empty. For complex needs (custom secrets, multiple steps), compose the actions directly instead of using this workflow."
        required: false
        type: string
        default: ""

      # ── Build configuration ─────────────────────────────────────────────────
      signing_mode:
        description: "'match' or 'secrets'"
        required: false
        type: string
        default: "match"
      upload_to_testflight:
        description: "Upload IPA to TestFlight after building"
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      # ── 1. Checkout, Xcode, Node, Meteor ──────────────────────────────────
      - name: Setup Meteor environment
        uses: mieweb/actions/prepare-meteor-cordova-env@v2
        with:
          xcode_path:   ${{ inputs.xcode_path }}
          node_version: ${{ inputs.node_version }}

      # ── 2. Pre-build hook (caller-provided script) ────────────────────────
      - name: Run pre-build script
        if: inputs.pre_build_script != ''
        shell: bash
        run: ${{ inputs.pre_build_script }}

      # ── 3. Meteor/Cordova iOS build ──────────────────────────────────────
      - name: Build iOS with Meteor/Cordova
        uses: mieweb/actions/run-meteor-build@v2
        with:
          platform: ios
          server: ${{ inputs.meteor_server }}

      # ── 4. Fastlane: pod install + sign + archive + upload ───────────────
      - name: Build & upload iOS to TestFlight
        uses: mieweb/actions/sign-archive-upload-ios@v2
        with:
          app_identifier:              ${{ inputs.app_identifier }}
          apple_team_id:               ${{ secrets.APPLE_TEAM_ID }}
          match_git_basic_authorization: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          match_password:              ${{ secrets.MATCH_PASSWORD }}
          apple_api_key_id:            ${{ secrets.APPLE_API_KEY_ID }}
          apple_api_issuer_id:         ${{ secrets.APPLE_API_ISSUER_ID }}
          apple_api_key_p8_base64:     ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          signing_mode:                ${{ inputs.signing_mode }}
          run_pod_install:             "true"
          upload_to_testflight:        ${{ inputs.upload_to_testflight }}
