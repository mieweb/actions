name: "Setup Meteor/Cordova Environment"
description: >
  Composite action that checks out the caller's repo, selects Xcode,
  installs Node.js and Meteor, and runs `meteor npm install`.

inputs:
  xcode_path:
    description: "Absolute path to Xcode.app"
    required: false
    default: "/Applications/Xcode_26.app"
  node_version:
    description: "Node.js version"
    required: false
    default: "20"
  github_packages_token:
    description: >
      Token used to authenticate `meteor npm install` to GitHub Packages for
      private deps (e.g. @bluehive-health/*). Defaults to the automatic
      github.token, which works when the caller and the packages live in the
      same org. For cross-org reusable-workflow callers (where github.token
      lacks package read access), pass a PAT with read:packages.
    required: false
    default: ${{ github.token }}
  ssh_key:
    description: >
      SSH private key for cloning private git submodules (e.g. Meteor
      packages hosted in separate private repos). Optional. When empty,
      checkout uses the default token and submodules are skipped, preserving
      the previous behaviour for callers without submodules.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # Clone private submodules over SSH only when a key is supplied;
        # otherwise behave exactly as before (token auth, no submodules).
        submodules: ${{ inputs.ssh_key != '' && 'recursive' || 'false' }}
        ssh-key: ${{ inputs.ssh_key }}

    - name: Select Xcode
      shell: bash
      env:
        XCODE_PATH: ${{ inputs.xcode_path }}
      run: |
        # Use the requested Xcode if it exists; otherwise fall back to the
        # latest Xcode 26.x, then to the newest stable Xcode on the runner.
        if [ -d "$XCODE_PATH/Contents/Developer" ]; then
          SELECTED="$XCODE_PATH"
        else
          echo "Requested Xcode not found at $XCODE_PATH — falling back."
          SELECTED=$(ls -td /Applications/Xcode_26*.app 2>/dev/null | head -n 1 || true)
          if [ -z "$SELECTED" ]; then
            SELECTED=$(ls -td /Applications/Xcode*.app \
              | grep -v -i -E '(beta|rc|gm|seed|preview)' | head -n 1)
          fi
        fi
        echo "Selected Xcode: $SELECTED"
        sudo xcode-select -s "$SELECTED/Contents/Developer"
        xcodebuild -version

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Install Meteor
      shell: bash
      run: |
        curl https://install.meteor.com/ | sh
        echo "$HOME/.meteor" >> $GITHUB_PATH

    - name: Install Meteor dependencies
      shell: bash
      env:
        GH_PACKAGES_TOKEN: ${{ inputs.github_packages_token }}
      run: |
        # The caller's .npmrc ships a bare GITHUB_TOKEN placeholder for private
        # GitHub Packages deps (e.g. @bluehive-health/*). Replace it with the
        # real token before installing. Matches the sed convention used across
        # the bluehive build workflows; npm does NOT expand a bare placeholder.
        if [ -f .npmrc ] && [ -n "$GH_PACKAGES_TOKEN" ]; then
          sed -i.bak "s/GITHUB_TOKEN/${GH_PACKAGES_TOKEN}/g" .npmrc
          rm -f .npmrc.bak
        fi
        meteor npm install
