name: "Setup Meteor/Cordova Android Environment"
description: >
  Composite action that checks out the caller's repo, installs the JDK,
  Node.js, the Android SDK (platform + build-tools), and Meteor, then runs
  `meteor npm install`. Prepares everything needed to build a signed Android
  app from a Meteor/Cordova project.

inputs:
  java_version:
    description: "JDK version for the Android/Gradle build"
    required: false
    default: "17"
  node_version:
    description: "Node.js version"
    required: false
    default: "20"
  android_api_level:
    description: "Android SDK platform API level to install"
    required: false
    default: "34"
  android_build_tools:
    description: "Android SDK build-tools version to install"
    required: false
    default: "35.0.0"
  github_packages_token:
    description: >
      Token used to authenticate `meteor npm install` to GitHub Packages for
      private deps (e.g. @bluehive-health/*). Defaults to the automatic
      github.token, which works when the caller and the packages live in the
      same org. For cross-org reusable-workflow callers (where github.token
      lacks package read access), pass a PAT with read:packages.
    required: false
    default: ${{ github.token }}
  ssh_key:
    description: >
      SSH private key for cloning private git submodules (e.g. Meteor
      packages hosted in separate private repos). Optional. When empty,
      checkout uses the default token and submodules are skipped, preserving
      the previous behaviour for callers without submodules.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # Clone private submodules over SSH only when a key is supplied;
        # otherwise behave exactly as before (token auth, no submodules).
        submodules: ${{ inputs.ssh_key != '' && 'recursive' || 'false' }}
        ssh-key: ${{ inputs.ssh_key }}

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java_version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK packages
      shell: bash
      env:
        ANDROID_API_LEVEL: ${{ inputs.android_api_level }}
        ANDROID_BUILD_TOOLS: ${{ inputs.android_build_tools }}
      run: |
        yes | sdkmanager --licenses >/dev/null || true
        sdkmanager \
          "platform-tools" \
          "platforms;android-${ANDROID_API_LEVEL}" \
          "build-tools;${ANDROID_BUILD_TOOLS}"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Install Meteor
      shell: bash
      run: |
        curl https://install.meteor.com/ | sh
        echo "$HOME/.meteor" >> $GITHUB_PATH

    - name: Install Meteor dependencies
      shell: bash
      env:
        GH_PACKAGES_TOKEN: ${{ inputs.github_packages_token }}
      run: |
        # The caller's .npmrc ships a bare GITHUB_TOKEN placeholder for private
        # GitHub Packages deps (e.g. @bluehive-health/*). Replace it with the
        # real token before installing. Matches the sed convention used across
        # the bluehive build workflows; npm does NOT expand a bare placeholder.
        if [ -f .npmrc ] && [ -n "$GH_PACKAGES_TOKEN" ]; then
          sed -i.bak "s/GITHUB_TOKEN/${GH_PACKAGES_TOKEN}/g" .npmrc
          rm -f .npmrc.bak
        fi
        meteor npm install
